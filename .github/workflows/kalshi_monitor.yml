name: Kalshi BTC 15-min Execution Engine

# ---------------------------------------------------------------
# Schedule: every 6 h as a safety-net restart. The bot exits
# cleanly at RUNTIME_LIMIT_MIN (default 5 h 45 min) and the final
# step re-triggers the next run via GH_PAT, so the chain is usually
# unbroken. The cron only fires if self-triggering was unavailable.
# ---------------------------------------------------------------
on:
  schedule:
    - cron: '11 */6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Override DRY_RUN for THIS run only ('true' or 'false'). Leave BLANK to use the DRY_RUN repo/env variable."
        required: false
        default: ""
      bet_amount_shares:
        description: "Override BET_AMOUNT_SHARES for THIS run only (contracts/SHARES bought per order — NOT dollars — fractional at 0.01 granularity, e.g. '0.01' or '1'). Leave BLANK to use the BET_AMOUNT_SHARES repo/env variable (default 0.01)."
        required: false
        default: ""
      arbitrage_shares:
        description: "Override ARBITRAGE_SHARES for THIS run and handoffs (paired BTC/ETH hedge shares when BTC loss streak > 0; default 10)."
        required: false
        default: ""
      loss_multiplier:
        description: "Override LOSS_MULTIPLIER for THIS run and handoffs (applies only to ARBITRAGE_SHARES during BTC/ETH hedge mode; default 2)."
        required: false
        default: ""

# At most one run at a time. A newly queued run waits; it never
# cancels the currently running bot mid-execution.
concurrency:
  group: kalshi-bot-singleton
  cancel-in-progress: false

# contents: write — the Persist State step commits trade_history.json /
# traded_market_tickers.json back to the repo after each run.
permissions:
  contents: write

jobs:
  execute-monitor:
    runs-on: ubuntu-latest
    environment: "Kalshi"
    # Hard ceiling: 6 h 10 min. The bot exits cleanly at 5 h 45 min,
    # so this only fires if the process hangs.
    timeout-minutes: 370

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi.txt

      - name: Write Kalshi RSA private key
        env:
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KALSHI_PRIVATE_KEY" > kalshi_private_key.pem
          chmod 600 kalshi_private_key.pem
          # sanity: confirm it is a PEM (does not print the key body)
          head -1 kalshi_private_key.pem

      - name: Resolve runtime inputs
        run: |
          {
            echo "DRY_RUN=${{ github.event.inputs.dry_run || vars.DRY_RUN || 'true' }}"
            echo "BET_AMOUNT_SHARES=${{ github.event.inputs.bet_amount_shares || vars.BET_AMOUNT_SHARES || '0.01' }}"
            echo "ARBITRAGE_SHARES=${{ github.event.inputs.arbitrage_shares || vars.ARBITRAGE_SHARES || '10' }}"
            echo "LOSS_MULTIPLIER=${{ github.event.inputs.loss_multiplier || vars.LOSS_MULTIPLIER || '2' }}"
            echo "ETH_HEDGE_POLL_S=${{ vars.ETH_HEDGE_POLL_S || '5' }}"
            echo "HISTORY_MINUTES=${{ vars.HISTORY_MINUTES || '500' }}"
            echo "FORECAST_MINUTES=${{ vars.FORECAST_MINUTES || '16' }}"
            echo "UNCERTAINTY_SAMPLES=${{ vars.UNCERTAINTY_SAMPLES || '1000' }}"
            echo "PREOPEN_FORECAST_LEAD_S=${{ vars.PREOPEN_FORECAST_LEAD_S || '60' }}"
            echo "OPEN_TRADE_GRACE_S=${{ vars.OPEN_TRADE_GRACE_S || '90' }}"
            echo "RUNTIME_LIMIT_MIN=345"
          } >> "$GITHUB_ENV"

      - name: Run Bot (continuous 5 h 45 min loop)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_PROD_API_KEY }}
          KALSHI_PEM_PATH:   kalshi_private_key.pem
          KALSHI_DEMO:       "false"
        run: python kalshibtc15minupordown.py

      - name: Persist State (trade history + traded windows)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Commit our state BEFORE pulling (same pattern as polymarket_monitor):
          # commit first, then rebase with --autostash so the chain stays clean.
          for f in trade_history.json traded_market_tickers.json; do
            [ -f "$f" ] && git add "$f" || true
          done
          git diff-index --quiet HEAD || (git commit -m "chore: persist kalshi bot state [skip ci]" && git pull --rebase --autostash origin main && git push)

      - name: Re-trigger next run (5 h 45 min handoff)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Re-dispatch with the effective inputs so manual overrides persist
          # across the 5h45m handoff chain. Scheduled runs still use env vars.
          gh workflow run kalshi_monitor.yml -R "${{ github.repository }}" \
            -f dry_run="$DRY_RUN" \
            -f bet_amount_shares="$BET_AMOUNT_SHARES" \
            -f arbitrage_shares="$ARBITRAGE_SHARES" \
            -f loss_multiplier="$LOSS_MULTIPLIER" \
            && echo "Handoff: next run queued." || echo "Handoff skipped (no GH_PAT?)."
