name: Kalshi BTC 15m ML-Side Average Down

# This is a continuous handoff chain: each runner owns the mechanical BTC
# strategy for 5h45m, persists its state/configuration, then queues its
# successor. The six-hour cron is only a restart safety net if a handoff fails.
# A manual run can update the configuration; blank numeric inputs preserve the
# prior persisted setting for all later scheduled and manual runs.
on:
  schedule:
    - cron: "11 */6 * * *"
  workflow_dispatch:
    inputs:
      live_trading:
        description: "Submit real orders for this manual run (scheduled runs are live)."
        required: true
        type: boolean
        default: true
      initial_position_size:
        description: "Contracts per 40c/30c/20c/10c rung. If changed alone, the four-rung contract and capital caps auto-scale; blank keeps persisted values."
        required: false
        type: string
        default: ""
      live_execution_strategy:
        description: "Blank keeps persisted mode. settlement_contrarian_weighted_hold_gate uses the opposite of the latest finalized BTC15M outcome at open+45s, with the live 1/2/3/4 ladder, 5c stop, and +60c/10c trail."
        required: false
        type: string
        default: ""
      live_inverse_ml_hold_gate:
        description: "Blank keeps persisted gate. For either weighted live mode, 0.60 means arm the 10c trail only after bid reaches current average entry + 60c."
        required: false
        type: string
        default: ""
      max_active_markets:
        description: "Blank keeps persisted value."
        required: false
        type: string
        default: ""
      max_contracts_per_market:
        description: "Optional explicit total contract cap; normally leave blank so it auto-scales to four times the rung quantity."
        required: false
        type: string
        default: ""
      max_total_capital:
        description: "Optional explicit principal cap; normally leave blank so it auto-scales to the full four-rung ladder."
        required: false
        type: string
        default: ""
      model_run_id:
        description: "Optional one-off ML model artifact run override. Blank uses the validated model registry."
        required: false
        type: string
        default: ""
      training_run_id:
        description: "Optional ledger-run override paired with model_run_id. Blank uses the model registry."
        required: false
        type: string
        default: ""

concurrency:
  group: kalshi-btc15m-average-down-singleton
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  trade:
    runs-on: ubuntu-latest
    environment: "Kalshi"
    # The trading process exits at 5h45m. This ceiling handles a hung runner.
    timeout-minutes: 370
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Resolve execution source
        env:
          STRATEGY_OVERRIDE: ${{ inputs.live_execution_strategy }}
        run: |
          set -euo pipefail
          strategy="$STRATEGY_OVERRIDE"
          if [ -z "$strategy" ]; then
            strategy="$(jq -er '.live_execution_strategy' kalshi_btc15m_average_down_config.json)"
          fi
          case "$strategy" in
            normal_ml_ladder|inverse_ml_weighted_hold_gate)
              use_ml=true
              ;;
            settlement_contrarian_weighted_hold_gate)
              use_ml=false
              ;;
            *)
              echo "Unsupported execution strategy: $strategy" >&2
              exit 1
              ;;
          esac
          {
            echo "EFFECTIVE_LIVE_EXECUTION_STRATEGY=$strategy"
            echo "USE_ML_INFERENCE=$use_ml"
          } >> "$GITHUB_ENV"
          echo "EXECUTION SOURCE | strategy=$strategy use_ml_inference=$use_ml"

      - name: Resolve validated ML model and feature ledger
        if: env.USE_ML_INFERENCE == 'true'
        env:
          MANUAL_MODEL_RUN_ID: ${{ inputs.model_run_id }}
          MANUAL_TRAINING_RUN_ID: ${{ inputs.training_run_id }}
        run: |
          set -euo pipefail
          if [ -n "$MANUAL_MODEL_RUN_ID" ]; then
            # Manual rollback is restricted to the current ML-only bundle
            # convention.  It cannot select the retired Prophet-era ledger.
            # The runner also validates the saved model's exact ML-only schema
            # before it can trade.
            MODEL_RUN_ID="$MANUAL_MODEL_RUN_ID"
            MODEL_ARTIFACT="kalshi-kxbtc15m-ml-model-$MODEL_RUN_ID"
            TRAINING_RUN_ID="${MANUAL_TRAINING_RUN_ID:-$MODEL_RUN_ID}"
            LEDGER_ARTIFACT="kalshi-kxbtc15m-ml-model-$TRAINING_RUN_ID"
            LEDGER_PATH="training_data/kxbtc15m_ml_only_feature_ledger.csv"
            MODEL_SOURCE="manual_override"
            PREVIOUS_MODEL_RUN_ID=""
            PREVIOUS_MODEL_ARTIFACT=""
          else
            test -s kalshi_ml_model_registry.json
            FEATURE_SCHEMA="$(jq -er '.feature_schema' kalshi_ml_model_registry.json)"
            test "$FEATURE_SCHEMA" = "ml_only_raw_candles_settled_outcomes_v1"
            MODEL_RUN_ID="$(jq -er '.active_model_run_id' kalshi_ml_model_registry.json)"
            MODEL_ARTIFACT="$(jq -er '.active_model_artifact_name' kalshi_ml_model_registry.json)"
            TRAINING_RUN_ID="$(jq -er '.active_ledger_run_id' kalshi_ml_model_registry.json)"
            LEDGER_ARTIFACT="$(jq -er '.active_ledger_artifact_name' kalshi_ml_model_registry.json)"
            LEDGER_PATH="$(jq -er '.active_ledger_path' kalshi_ml_model_registry.json)"
            MODEL_SOURCE="validated_registry"
            PREVIOUS_MODEL_RUN_ID="$(jq -r '.previous_model_run_id // empty' kalshi_ml_model_registry.json)"
            PREVIOUS_MODEL_ARTIFACT="$(jq -r '.previous_model_artifact_name // empty' kalshi_ml_model_registry.json)"
          fi
          {
            echo "MODEL_RUN_ID=$MODEL_RUN_ID"
            echo "MODEL_ARTIFACT=$MODEL_ARTIFACT"
            echo "TRAINING_RUN_ID=$TRAINING_RUN_ID"
            echo "LEDGER_ARTIFACT=$LEDGER_ARTIFACT"
            echo "LEDGER_PATH=$LEDGER_PATH"
            echo "MODEL_SOURCE=$MODEL_SOURCE"
            echo "PREVIOUS_MODEL_RUN_ID=$PREVIOUS_MODEL_RUN_ID"
            echo "PREVIOUS_MODEL_ARTIFACT=$PREVIOUS_MODEL_ARTIFACT"
          } >> "$GITHUB_ENV"
          echo "ML MODEL RESOLVED | source=$MODEL_SOURCE model_run=$MODEL_RUN_ID ledger_run=$TRAINING_RUN_ID ledger_path=$LEDGER_PATH"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ML-side runner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi_average_down.txt

      - name: Verify mechanical strategy
        run: |
          python -m py_compile kalshi_ladder_scalp_shadow.py kalshi_btc15m_average_down.py
          python -m unittest -v test_kalshi_btc15m_average_down.py test_kalshi_ladder_scalp_shadow.py

      - name: Download stored ML model and frozen feature ledger
        if: env.USE_ML_INFERENCE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "$MODEL_RUN_ID" -R "$GITHUB_REPOSITORY" \
            -n "$MODEL_ARTIFACT" -D stored_model
          gh run download "$TRAINING_RUN_ID" -R "$GITHUB_REPOSITORY" \
            -n "$LEDGER_ARTIFACT" -D training_data
          if [ -n "$PREVIOUS_MODEL_RUN_ID" ] && [ "$PREVIOUS_MODEL_RUN_ID" != "$MODEL_RUN_ID" ] && [ -n "$PREVIOUS_MODEL_ARTIFACT" ]; then
            gh run download "$PREVIOUS_MODEL_RUN_ID" -R "$GITHUB_REPOSITORY" \
              -n "$PREVIOUS_MODEL_ARTIFACT" -D previous_model
            test -s previous_model/kxbtc15m_ml_model.joblib
            test -s previous_model/kxbtc15m_ml_model_metadata.json
            echo "ML TRANSITION COMPARATOR READY | prior_run=$PREVIOUS_MODEL_RUN_ID current_run=$MODEL_RUN_ID"
          else
            echo "ML TRANSITION COMPARATOR | no distinct predecessor registered for this model."
          fi
          test -s stored_model/kxbtc15m_ml_model.joblib
          test -s stored_model/kxbtc15m_ml_model_metadata.json
          test -s stored_model/holdout_backtest.json
          test -s "training_data/$LEDGER_PATH"

      - name: Write Kalshi RSA private key
        env:
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KALSHI_PRIVATE_KEY" > kalshi_private_key.pem
          chmod 600 kalshi_private_key.pem

      - name: Configure durable state checkpoint identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run continuous BTC 15-minute average-down loop
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_PROD_API_KEY }}
          KALSHI_PEM_PATH: kalshi_private_key.pem
          KALSHI_DEMO: "false"
          # The runner commits only material strategy changes (not quote
          # polling) so an interrupted runner leaves a recoverable ledger.
          KALSHI_CHECKPOINT_PUBLISH: "true"
          GITHUB_TOKEN: ${{ github.token }}
          LIVE_TRADING: ${{ github.event_name == 'schedule' || inputs.live_trading == true }}
          INITIAL_POSITION_SIZE: ${{ inputs.initial_position_size }}
          LIVE_EXECUTION_STRATEGY: ${{ inputs.live_execution_strategy }}
          LIVE_INVERSE_ML_HOLD_GATE: ${{ inputs.live_inverse_ml_hold_gate }}
          MAX_ACTIVE_MARKETS: ${{ inputs.max_active_markets }}
          MAX_CONTRACTS_PER_MARKET: ${{ inputs.max_contracts_per_market }}
          MAX_TOTAL_CAPITAL: ${{ inputs.max_total_capital }}
        run: |
          set -euo pipefail
          args=(--config kalshi_btc15m_average_down_config.json
                --state-file kalshi_btc15m_average_down_state.json
                --report kalshi_btc15m_average_down_report.json
                --persist-config --run-seconds 20700)
          if [ "$USE_ML_INFERENCE" = "true" ]; then
            args+=(--ml-model-path stored_model/kxbtc15m_ml_model.joblib
                   --ml-model-metadata stored_model/kxbtc15m_ml_model_metadata.json
                   --ml-validation-report stored_model/holdout_backtest.json
                   --ml-model-run-id "$MODEL_RUN_ID"
                   --ml-training-run-id "$TRAINING_RUN_ID"
                   --ml-training-csv "training_data/$LEDGER_PATH")
          else
            echo "SETTLEMENT CONTRARIAN | skipping ML model download and inference."
          fi
          [ -z "$INITIAL_POSITION_SIZE" ] || args+=(--initial-position-size "$INITIAL_POSITION_SIZE")
          [ -z "$LIVE_EXECUTION_STRATEGY" ] || args+=(--live-execution-strategy "$LIVE_EXECUTION_STRATEGY")
          [ -z "$LIVE_INVERSE_ML_HOLD_GATE" ] || args+=(--live-inverse-ml-hold-gate "$LIVE_INVERSE_ML_HOLD_GATE")
          [ -z "$MAX_ACTIVE_MARKETS" ] || args+=(--max-active-markets "$MAX_ACTIVE_MARKETS")
          [ -z "$MAX_CONTRACTS_PER_MARKET" ] || args+=(--max-contracts-per-market "$MAX_CONTRACTS_PER_MARKET")
          [ -z "$MAX_TOTAL_CAPITAL" ] || args+=(--max-total-capital "$MAX_TOTAL_CAPITAL")
          if [ "$USE_ML_INFERENCE" = "true" ] && [ -s previous_model/kxbtc15m_ml_model.joblib ]; then
            args+=(--previous-ml-model-path previous_model/kxbtc15m_ml_model.joblib
                   --previous-ml-model-metadata previous_model/kxbtc15m_ml_model_metadata.json
                   --previous-ml-model-run-id "$PREVIOUS_MODEL_RUN_ID")
          fi
          if [ "$LIVE_TRADING" = "true" ]; then
            DRY_RUN=false python kalshi_btc15m_average_down.py "${args[@]}" --submit --allow-live
          else
            DRY_RUN=true python kalshi_btc15m_average_down.py "${args[@]}"
          fi

      - name: Persist mechanical strategy state and configuration
        if: always()
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          files=(
            kalshi_btc15m_average_down_config.json
            kalshi_btc15m_average_down_state.json kalshi_btc15m_average_down_report.json
            kalshi_btc15m_weighted_trailing_normal_ledger.json kalshi_btc15m_weighted_trailing_normal_report.json
            kalshi_btc15m_weighted_trailing_inverse_ledger.json kalshi_btc15m_weighted_trailing_inverse_report.json
            kalshi_btc15m_actual_price_bracket_normal_ledger.json kalshi_btc15m_actual_price_bracket_normal_report.json
            kalshi_btc15m_actual_price_bracket_inverse_ledger.json kalshi_btc15m_actual_price_bracket_inverse_report.json
          )
          for file in "${files[@]}"; do
            test ! -f "$file" || git add "$file"
          done
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record BTC average-down state [skip ci]"
          rebase_checkpoint() {
            if git pull --rebase --autostash origin main; then
              return 0
            fi
            while git rev-parse -q --verify REBASE_HEAD >/dev/null; do
              local conflicts
              mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
              if [ "${#conflicts[@]}" -eq 0 ]; then
                git rebase --abort 2>/dev/null || true
                return 1
              fi
              for file in "${conflicts[@]}"; do
                case " ${files[*]} " in
                  *" $file "*) ;;
                  *) git rebase --abort 2>/dev/null || true; return 1 ;;
                esac
              done
              # Keep this runner's newest local state snapshot while
              # replaying it; reject any conflict outside its owned files.
              git checkout --theirs -- "${conflicts[@]}"
              git add -- "${conflicts[@]}"
              GIT_EDITOR=true git rebase --continue || {
                git rebase --abort 2>/dev/null || true
                return 1
              }
            done
            return 0
          }
          for attempt in 1 2 3; do
            if rebase_checkpoint && git push origin HEAD:main; then
              exit 0
            fi
            sleep "$attempt"
          done
          echo "::error::Unable to publish ML state after three safe retries."
          exit 1

      - name: Queue the next 5h45m live handoff
        # A requested dry run remains a one-off safety check. Scheduled and
        # explicitly live runs hand off as live runs, using the configuration
        # just committed above (including any manual share-size update).
        if: success() && (github.event_name == 'schedule' || inputs.live_trading == true)
        env:
          # workflow_dispatch is explicitly allowed to create a follow-on run
          # with GITHUB_TOKEN. GH_PAT remains preferred when configured.
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          gh workflow run kalshi_btc15m_average_down.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f live_trading=true
          echo "HANDOFF QUEUED | next live 5h45m runner uses the persisted configuration."

      - name: Upload execution audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kalshi-btc15m-average-down-${{ github.run_id }}
          path: |
            kalshi_btc15m_average_down_config.json
            kalshi_btc15m_average_down_state.json
            kalshi_btc15m_average_down_report.json
            kalshi_btc15m_weighted_trailing_normal_ledger.json
            kalshi_btc15m_weighted_trailing_normal_report.json
            kalshi_btc15m_weighted_trailing_inverse_ledger.json
            kalshi_btc15m_weighted_trailing_inverse_report.json
            kalshi_btc15m_actual_price_bracket_normal_ledger.json
            kalshi_btc15m_actual_price_bracket_normal_report.json
            kalshi_btc15m_actual_price_bracket_inverse_ledger.json
            kalshi_btc15m_actual_price_bracket_inverse_report.json
          if-no-files-found: warn
          retention-days: 90
