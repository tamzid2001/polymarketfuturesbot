name: Kalshi BTC 15m Settlement Contrarian

# Each run owns the trader for 5h25m, checkpoints durable state, and queues
# the next run. The 35-minute margin keeps persistence and handoff inside the
# GitHub-hosted six-hour maximum instead of relying on a SIGTERM at the edge.
on:
  schedule:
    - cron: "11 */6 * * *"
  workflow_dispatch:
    inputs:
      live_trading:
        description: "Submit real settlement-contrarian orders (scheduled runs are live)."
        required: true
        type: boolean
        default: true
      initial_position_size:
        description: "Persistent ladder share multiplier. 3 means 3×40c, 6×30c, 9×20c, and 12×10c. Blank keeps the saved value."
        required: false
        type: string
        default: ""
      max_active_markets:
        description: "Blank keeps the saved value."
        required: false
        type: string
        default: ""
      max_contracts_per_market:
        description: "Optional explicit total cap. Blank auto-scales with the 1/2/3/4 ladder."
        required: false
        type: string
        default: ""
      max_total_capital:
        description: "Optional explicit principal cap. Blank auto-scales with the 1/2/3/4 ladder."
        required: false
        type: string
        default: ""

concurrency:
  group: kalshi-btc15m-average-down-singleton
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  trade:
    runs-on: ubuntu-latest
    environment: "Kalshi"
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install settlement trader dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi_settlement_trader.txt

      - name: Verify settlement trader
        run: |
          python -m py_compile kalshi_btc15m_average_down.py
          python -m unittest -v test_kalshi_btc15m_settlement_trader.py

      - name: Write Kalshi RSA private key
        env:
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KALSHI_PRIVATE_KEY" > kalshi_private_key.pem
          chmod 600 kalshi_private_key.pem

      - name: Configure durable state checkpoint identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run settlement-contrarian BTC 15-minute loop
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_PROD_API_KEY }}
          KALSHI_PEM_PATH: kalshi_private_key.pem
          KALSHI_DEMO: "false"
          KALSHI_CHECKPOINT_PUBLISH: "true"
          GITHUB_TOKEN: ${{ github.token }}
          LIVE_TRADING: ${{ github.event_name == 'schedule' || inputs.live_trading == true }}
          INITIAL_POSITION_SIZE: ${{ inputs.initial_position_size }}
          MAX_ACTIVE_MARKETS: ${{ inputs.max_active_markets }}
          MAX_CONTRACTS_PER_MARKET: ${{ inputs.max_contracts_per_market }}
          MAX_TOTAL_CAPITAL: ${{ inputs.max_total_capital }}
        run: |
          set -euo pipefail
          args=(--config kalshi_btc15m_average_down_config.json
                --state-file kalshi_btc15m_average_down_state.json
                --report kalshi_btc15m_average_down_report.json
                --persist-config --run-seconds 19500)
          [ -z "$INITIAL_POSITION_SIZE" ] || args+=(--initial-position-size "$INITIAL_POSITION_SIZE")
          [ -z "$MAX_ACTIVE_MARKETS" ] || args+=(--max-active-markets "$MAX_ACTIVE_MARKETS")
          [ -z "$MAX_CONTRACTS_PER_MARKET" ] || args+=(--max-contracts-per-market "$MAX_CONTRACTS_PER_MARKET")
          [ -z "$MAX_TOTAL_CAPITAL" ] || args+=(--max-total-capital "$MAX_TOTAL_CAPITAL")
          if [ "$LIVE_TRADING" = "true" ]; then
            DRY_RUN=false python kalshi_btc15m_average_down.py "${args[@]}" --submit --allow-live
          else
            DRY_RUN=true python kalshi_btc15m_average_down.py "${args[@]}"
          fi

      - name: Persist settlement trader state and configuration
        if: always()
        run: |
          set -euo pipefail
          files=(
            kalshi_btc15m_average_down_config.json
            kalshi_btc15m_average_down_state.json
            kalshi_btc15m_average_down_report.json
          )
          for file in "${files[@]}"; do
            test ! -f "$file" || git add "$file"
          done
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record BTC settlement trader state [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep "$attempt"
          done
          echo "::error::Unable to publish settlement trader state after three retries."
          exit 1

      - name: Queue the next live handoff
        if: success() && (github.event_name == 'schedule' || inputs.live_trading == true)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          gh workflow run kalshi_btc15m_average_down.yml --repo "$GITHUB_REPOSITORY" --ref main -f live_trading=true
          echo "HANDOFF QUEUED | next run keeps the persisted share multiplier and settlement-only exit policy."

      - name: Upload execution audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kalshi-btc15m-settlement-trader-${{ github.run_id }}
          path: |
            kalshi_btc15m_average_down_config.json
            kalshi_btc15m_average_down_state.json
            kalshi_btc15m_average_down_report.json
          if-no-files-found: warn
          retention-days: 90
