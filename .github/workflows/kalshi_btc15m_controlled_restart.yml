name: Controlled Restart — Kalshi BTC 15m Settlement Contrarian

# This workflow is intentionally manual.  It provides a safe live-code
# handoff: stop one known older runner, retain its resting deterministic ladder
# for exchange recovery, then queue the current settlement-only runner.
# Filled contracts and manual orders are never modified.
on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "The running Kalshi average-down Actions run to stop before handoff."
        required: true
        type: string
        default: "29766662134"

permissions:
  contents: read
  actions: write

concurrency:
  group: kalshi-btc15m-average-down-controlled-restart
  cancel-in-progress: false

jobs:
  handoff:
    runs-on: ubuntu-latest
    environment: "Kalshi"
    timeout-minutes: 12
    steps:
      - name: Checkout current settlement-trader code
        uses: actions/checkout@v7

      - name: Stop the specified older runner
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          gh run cancel "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" || true
          for attempt in $(seq 1 12); do
            status="$(gh run view "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --json status --jq '.status')"
            echo "SOURCE RUN STATUS | attempt=$attempt status=$status"
            [ "$status" = "completed" ] && exit 0
            sleep 5
          done
          echo "The old runner did not stop within 60 seconds; refusing to overlap a live bot." >&2
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install controlled-handoff dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi_settlement_trader.txt

      - name: Write Kalshi RSA private key
        env:
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KALSHI_PRIVATE_KEY" > kalshi_private_key.pem
          chmod 600 kalshi_private_key.pem

      - name: Start the current settlement-only runner
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run kalshi_btc15m_average_down.yml \
            --repo "$GITHUB_REPOSITORY" --ref main -f live_trading=true
          echo "SETTLEMENT RUNNER QUEUED | existing deterministic orders will be recovered; no overlap remains."
