name: Polymarket Portfolio Execution Engine

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execute-monitor:
    runs-on: ubuntu-latest
    environment: "Polymarket US Futures"
    steps:
      - name: Checkout Repository Context
        uses: actions/checkout@v7

      - name: Setup Runtime Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Portfolio Inspection Engine
        env:
          POLYMARKET_PUBLIC_KEY: ${{ secrets.POLYMARKET_PUBLIC_KEY }}
          POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
          TELEGRAM_KEY: ${{ secrets.TELEGRAM_KEY }}
        run: python polymarket_bot.py

      - name: Reconcile State Machine Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff-index --quiet HEAD || (git commit -m "chore: persist automated execution state [skip ci]" && git push)
