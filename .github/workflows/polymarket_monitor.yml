name: Polymarket Portfolio Execution Engine

# ---------------------------------------------------------------
# Schedule: daily at 00:07 UTC as a safety-net restart.
# The bot self-triggers the next run at the 5h 45m mark via GH_PAT
# (if configured), so the chain is usually unbroken. The daily cron
# only fires if self-triggering has been unavailable or the chain
# was interrupted for any reason.
# ---------------------------------------------------------------
on:
  schedule:
    - cron: '7 0 * * *'
  workflow_dispatch:

# At most one run at a time. A newly queued run waits; it never
# cancels the currently running bot mid-execution.
concurrency:
  group: polymarket-bot-singleton
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  execute-monitor:
    runs-on: ubuntu-latest
    environment: "Polymarket US Futures"
    # Hard ceiling: 6 h 10 min. The bot exits cleanly at 5 h 45 min,
    # so this only fires if the process hangs.
    timeout-minutes: 370

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot (continuous 5 h 45 min loop)
        env:
          POLYMARKET_PUBLIC_KEY: ${{ secrets.POLYMARKET_PUBLIC_KEY }}
          POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
          TELEGRAM_KEY: ${{ secrets.TELEGRAM_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python polymarket_bot.py

      - name: Persist State
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Stage and commit our state BEFORE pulling. The bot rewrites
          # state.json (and markets.json) during the run, so a plain
          # `git pull --rebase` aborts with "cannot pull with rebase:
          # You have unstaged changes." Committing first, then rebasing
          # with --autostash (which shelves the leftover markets.json
          # change around the rebase), keeps the chain clean.
          git add state.json
          git diff-index --quiet HEAD || (git commit -m "chore: persist bot state [skip ci]" && git pull --rebase --autostash origin main && git push)
