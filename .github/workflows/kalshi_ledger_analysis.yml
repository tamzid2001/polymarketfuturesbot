name: Kalshi Ledger Statistical Analysis

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Backtest workflow run ID whose artifact contains prophet_ml_backtest_rows.csv."
        required: true
        default: "29698207476"
      signal:
        description: "Analyze Prophet, ML, or both signals."
        required: true
        default: "all"
      starting_balance:
        description: "Starting balance used only when the ledger contains actual realized P&L."
        required: true
        default: "1000"
      prophet_origins:
        description: "Number of rolling historical Prophet cutoffs for the five-trade policy test."
        required: true
        default: "25"

permissions:
  actions: read
  contents: read

jobs:
  analyze-ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi_ledger_analysis.txt

      - name: Run Offline Tests
        run: python test_ledger_analysis.py

      - name: Download Backtest Artifact
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          gh run download "$SOURCE_RUN_ID" -R "${{ github.repository }}" \
            -n "kalshi-btc15m-backtest-$SOURCE_RUN_ID" -D ledger_input

      - name: Analyze Ledger
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python kalshi_ledger_analysis.py \
            --input ledger_input \
            --output-dir ledger_analysis_output \
            --signal "${{ inputs.signal }}" \
            --starting-balance "${{ inputs.starting_balance }}" \
            --prophet-origins "${{ inputs.prophet_origins }}"

      - name: Upload Analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kalshi-ledger-analysis-${{ github.run_id }}
          path: ledger_analysis_output/
          if-no-files-found: warn
          retention-days: 30
