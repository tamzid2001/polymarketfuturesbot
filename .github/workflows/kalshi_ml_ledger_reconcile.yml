name: Kalshi ML Ledger Reconciliation

# No orders are created here. This job only resolves prior submitted/skipped
# ML signals and persists the realized counterfactual result to the ledger.
on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

concurrency:
  group: kalshi-ml-ledger-singleton
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    environment: "Kalshi"
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi.txt

      - name: Write Kalshi RSA Private Key
        env:
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KALSHI_PRIVATE_KEY" > kalshi_private_key.pem
          chmod 600 kalshi_private_key.pem
          head -1 kalshi_private_key.pem

      - name: Reconcile Settled ML Signals (No Orders)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_PROD_API_KEY }}
          KALSHI_PEM_PATH: kalshi_private_key.pem
          KALSHI_DEMO: "false"
          DRY_RUN: "true"
        run: |
          python kalshi_ml_inference_live.py \
            --state-file ml_inference_ledger.json \
            --reconcile-only

      - name: Persist Settled Ledger Entries
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ml_inference_ledger.json
          git diff-index --quiet HEAD || \
            (git commit -m "chore: reconcile ML signal ledger [skip ci]" && \
             git pull --rebase --autostash origin main && git push)
