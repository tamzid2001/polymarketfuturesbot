name: Kalshi Contrarian Streak Backtest

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Backtest run ID whose artifact contains prophet_ml_backtest_rows.csv."
        required: true
        default: "29698207476"
      signal:
        description: "Original signal outcomes to test."
        required: true
        default: "all"
      min_train_trades:
        description: "Minimum chronological rows available before out-of-sample probabilities."
        required: true
        default: "2000"
      test_blocks:
        description: "Number of expanding chronological out-of-sample blocks."
        required: true
        default: "5"
      probability_threshold:
        description: "Calibrated all-loss/all-win decision threshold."
        required: true
        default: "0.50"

permissions:
  actions: read
  contents: read

jobs:
  contrarian-streak-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi_ledger_analysis.txt

      - name: Run Offline Tests
        run: |
          python test_kalshi_streak_ml_backtest.py
          python test_kalshi_contrarian_streak_backtest.py

      - name: Download Backtest Artifact
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          gh run download "$SOURCE_RUN_ID" -R "${{ github.repository }}" \
            -n "kalshi-btc15m-backtest-$SOURCE_RUN_ID" -D contrarian_input

      - name: Run Chronological Contrarian Backtest
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python kalshi_contrarian_streak_backtest.py \
            --input contrarian_input \
            --output-dir contrarian_streak_backtest_output \
            --signal "${{ inputs.signal }}" \
            --min-train-trades "${{ inputs.min_train_trades }}" \
            --test-blocks "${{ inputs.test_blocks }}" \
            --probability-threshold "${{ inputs.probability_threshold }}"

      - name: Upload Backtest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kalshi-contrarian-streak-backtest-${{ github.run_id }}
          path: contrarian_streak_backtest_output/
          if-no-files-found: warn
          retention-days: 30
