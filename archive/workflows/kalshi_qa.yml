name: Kalshi QA — Secrets, BTC Data, Prophet Forecast, Kalshi WS & Order Build

# Manual pre-production check. Runs the full QA suite against live
# credentials WITHOUT ever submitting a real order.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa-test:
    runs-on: ubuntu-latest
    environment: "Kalshi"
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi.txt

      - name: Write Kalshi RSA private key
        env:
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KALSHI_PRIVATE_KEY" > kalshi_private_key.pem
          chmod 600 kalshi_private_key.pem
          head -1 kalshi_private_key.pem

      - name: Run QA Suite (no real orders)
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_PROD_API_KEY }}
          KALSHI_PEM_PATH:   kalshi_private_key.pem
          KALSHI_DEMO:       "false"
          KALSHI_WS_VERBOSE: "true"
          # QA must NEVER trade: the suite also force-overrides DRY_RUN in-process.
          DRY_RUN:           "true"
          BET_AMOUNT_SHARES: ${{ vars.BET_AMOUNT_SHARES || '0.01' }}
        run: python test_kalshi_bot.py
