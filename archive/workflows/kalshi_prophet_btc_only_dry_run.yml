name: Kalshi Prophet BTC-only GTC Ladder — Selector

# Paper mode is the default.  A manual, typed confirmation can deliberately
# switch the one locked primary ladder to the pre-open-frozen selector side.
# The normal, inverse, and selector paper ledgers persist independently.
on:
  workflow_dispatch:
    inputs:
      run_minutes:
        description: "Paper-monitor duration in minutes (300-345; default 345)."
        required: true
        default: "345"
        type: string
      bet_amount_shares:
        description: "Paper shares per 40c/30c/20c/10c rung (default 1; not dollars)."
        required: true
        default: "1"
        type: string
      execution_mode:
        description: "paper keeps every ladder simulated; live submits only the selector's one frozen side."
        required: true
        default: "paper"
        type: choice
        options:
          - paper
          - live
      live_confirmation:
        description: "Required only for live: type LIVE_PROPHET_SELECTOR exactly."
        required: false
        default: ""
        type: string

concurrency:
  group: kalshi-prophet-btc-only-dry-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  paper-monitor:
    name: Prophet BTC-only selector
    runs-on: ubuntu-latest
    environment: "Kalshi"
    timeout-minutes: 370
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install runner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_kalshi.txt

      - name: Verify locked-ladder safety checks
        run: |
          python -m py_compile kalshi_ladder_scalp_shadow.py kalshibtc15minupordown.py kalshi_btc15m_prophet_btc_only.py
          python -m unittest -v test_kalshi_bot.py test_kalshi_dry_quote_simulation.py test_kalshi_ladder_scalp_shadow.py

      - name: Write Kalshi RSA private key
        env:
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$KALSHI_PRIVATE_KEY" > kalshi_private_key.pem
          chmod 600 kalshi_private_key.pem
          head -1 kalshi_private_key.pem

      - name: Run Prophet BTC-only GTC ladder
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_PROD_API_KEY }}
          KALSHI_PEM_PATH: kalshi_private_key.pem
          KALSHI_DEMO: "false"
          # Defaults to paper. Live requires the workflow input confirmation
          # checked below and still submits only the selector's frozen side.
          DRY_RUN: ${{ inputs.execution_mode == 'live' && 'false' || 'true' }}
          EXECUTION_MODE: ${{ inputs.execution_mode }}
          LIVE_CONFIRMATION: ${{ inputs.live_confirmation }}
          BET_AMOUNT_SHARES: ${{ inputs.bet_amount_shares }}
          RUNTIME_LIMIT_MIN: ${{ inputs.run_minutes }}
          TRADE_HISTORY_FILE: prophet_btc_only_trade_history.json
          TRADED_TICKERS_FILE: prophet_btc_only_traded_market_tickers.json
          # The inverse and selector ledgers are both paper-only in paper mode.
          # In live mode, the inverse remains disabled while the primary runner
          # uses only the selector's pre-open-frozen side.
          INVERSE_PROPHET_SHADOW_ENABLED: "true"
          INVERSE_PROPHET_SHADOW_HISTORY_FILE: prophet_btc_inverse_shadow_history.json
          INVERSE_PROPHET_SHADOW_REPORT_FILE: prophet_btc_inverse_shadow_report.json
          PROPHET_LADDER_SCALP_SHADOW_ENABLED: "true"
          PROPHET_LADDER_SCALP_SHADOW_HISTORY_FILE: prophet_btc_ladder_scalp_shadow_history.json
          PROPHET_LADDER_SCALP_SHADOW_REPORT_FILE: prophet_btc_ladder_scalp_shadow_report.json
          PROPHET_LADDER_SCALP_SHADOW_POSITION_SIZE: "1"
          PROPHET_LADDER_SCALP_SHADOW_PROFIT_TARGET: "0.01"
          PROPHET_WEIGHTED_TRAILING_SHADOW_ENABLED: "true"
          PROPHET_WEIGHTED_TRAILING_SHADOW_NORMAL_HISTORY_FILE: prophet_btc_weighted_trailing_normal_history.json
          PROPHET_WEIGHTED_TRAILING_SHADOW_NORMAL_REPORT_FILE: prophet_btc_weighted_trailing_normal_report.json
          PROPHET_WEIGHTED_TRAILING_SHADOW_INVERSE_HISTORY_FILE: prophet_btc_weighted_trailing_inverse_history.json
          PROPHET_WEIGHTED_TRAILING_SHADOW_INVERSE_REPORT_FILE: prophet_btc_weighted_trailing_inverse_report.json
          PROPHET_WEIGHTED_TRAILING_STOP_PER_CONTRACT: "0.10"
          PROPHET_SELECTOR_ENABLED: "true"
          PROPHET_SELECTOR_HISTORY_FILE: prophet_btc_selector_history.json
          PROPHET_SELECTOR_REPORT_FILE: prophet_btc_selector_report.json
        run: |
          set -euo pipefail
          case "$RUNTIME_LIMIT_MIN" in
            ''|*[!0-9]*) echo "run_minutes must be a whole number"; exit 2 ;;
          esac
          if [ "$RUNTIME_LIMIT_MIN" -lt 300 ] || [ "$RUNTIME_LIMIT_MIN" -gt 345 ]; then
            echo "run_minutes must be between 300 and 345"; exit 2
          fi
          case "$EXECUTION_MODE" in
            paper)
              test "$DRY_RUN" = "true"
              echo "PAPER MODE CONFIRMED | DRY_RUN=$DRY_RUN shares_per_rung=$BET_AMOUNT_SHARES runtime=${RUNTIME_LIMIT_MIN}m"
              ;;
            live)
              test "$DRY_RUN" = "false"
              test "$LIVE_CONFIRMATION" = "LIVE_PROPHET_SELECTOR"
              echo "LIVE SELECTOR CONFIRMED | one frozen selector side only; shares_per_rung=$BET_AMOUNT_SHARES runtime=${RUNTIME_LIMIT_MIN}m"
              ;;
            *) echo "execution_mode must be paper or live"; exit 2 ;;
          esac
          python kalshi_btc15m_prophet_btc_only.py

      - name: Persist paper-monitor state
        if: always()
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          files=(
            prophet_btc_only_trade_history.json prophet_btc_only_traded_market_tickers.json
            prophet_btc_inverse_shadow_history.json prophet_btc_inverse_shadow_report.json
            prophet_btc_ladder_scalp_shadow_history.json prophet_btc_ladder_scalp_shadow_report.json
            prophet_btc_weighted_trailing_normal_history.json prophet_btc_weighted_trailing_normal_report.json
            prophet_btc_weighted_trailing_inverse_history.json prophet_btc_weighted_trailing_inverse_report.json
            prophet_btc_selector_history.json prophet_btc_selector_report.json
          )
          for file in "${files[@]}"; do
            test ! -f "$file" || git add "$file"
          done
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: record Prophet BTC paper ladder [skip ci]"
          rebase_checkpoint() {
            if git pull --rebase --autostash origin main; then
              return 0
            fi
            while git rev-parse -q --verify REBASE_HEAD >/dev/null; do
              local conflicts
              mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
              if [ "${#conflicts[@]}" -eq 0 ]; then
                git rebase --abort 2>/dev/null || true
                return 1
              fi
              for file in "${conflicts[@]}"; do
                case " ${files[*]} " in
                  *" $file "*) ;;
                  *) git rebase --abort 2>/dev/null || true; return 1 ;;
                esac
              done
              # `--theirs` is the local ledger commit while rebasing.  These
              # are this workflow's owned report files, so retain its newest
              # snapshot and continue rather than leaving U files behind.
              git checkout --theirs -- "${conflicts[@]}"
              git add -- "${conflicts[@]}"
              GIT_EDITOR=true git rebase --continue || {
                git rebase --abort 2>/dev/null || true
                return 1
              }
            done
            return 0
          }
          for attempt in 1 2 3; do
            if rebase_checkpoint && git push origin HEAD:main; then
              exit 0
            fi
            sleep "$attempt"
          done
          echo "::error::Unable to publish Prophet state after three safe retries."
          exit 1

      - name: Queue next 5h45m dry-run handoff
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          BET_AMOUNT_SHARES: ${{ inputs.bet_amount_shares }}
          EXECUTION_MODE: ${{ inputs.execution_mode }}
          LIVE_CONFIRMATION: ${{ inputs.live_confirmation }}
        run: |
          set -euo pipefail
          gh workflow run kalshi_prophet_btc_only_dry_run.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f run_minutes=345 \
            -f bet_amount_shares="$BET_AMOUNT_SHARES" \
            -f execution_mode="$EXECUTION_MODE" \
            -f live_confirmation="$LIVE_CONFIRMATION"
          echo "SELECTOR HANDOFF QUEUED | next 5h45m run preserves mode and persisted ledgers."

      - name: Upload paper-monitor audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kalshi-prophet-btc-only-paper-${{ github.run_id }}
          path: |
            prophet_btc_only_trade_history.json
            prophet_btc_only_traded_market_tickers.json
            prophet_btc_inverse_shadow_history.json
            prophet_btc_inverse_shadow_report.json
            prophet_btc_ladder_scalp_shadow_history.json
            prophet_btc_ladder_scalp_shadow_report.json
            prophet_btc_weighted_trailing_normal_history.json
            prophet_btc_weighted_trailing_normal_report.json
            prophet_btc_weighted_trailing_inverse_history.json
            prophet_btc_weighted_trailing_inverse_report.json
            prophet_btc_selector_history.json
            prophet_btc_selector_report.json
          if-no-files-found: warn
          retention-days: 90
